<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Control - Pinch Zoom Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: radial-gradient(circle, #000814 0%, #000000 100%); font-family: 'Segoe UI', sans-serif; }
        #video_container { position: absolute; bottom: 20px; right: 20px; width: 200px; border-radius: 12px; overflow: hidden; border: 2px solid #00f2ff; box-shadow: 0 0 20px #00f2ff; transform: scaleX(-1); z-index: 10; }
        video { width: 100%; display: block; }
        #ui { position: absolute; top: 20px; left: 20px; color: #fff; background: rgba(0,0,0,0.7); padding: 20px; border-radius: 15px; border-left: 5px solid #00f2ff; pointer-events: none; z-index: 10; }
        .cmd { color: #00f2ff; font-weight: bold; }
        .info { font-size: 12px; color: #aaa; margin-top: 10px; border-top: 1px solid #444; padding-top: 10px; }
        .hl { color: #fff; border-bottom: 1px solid #00f2ff; }
    </style>
</head>
<body>

<div id="ui">
    <h2 style="margin:0 0 10px 0">Cosmic Control</h2>
    <p><span class="cmd">Kepal:</span> Saturnus</p>
    <p><span class="cmd">1 Jari:</span> Menara Eiffel</p>
    <p><span class="cmd">2 Jari:</span> Bumi</p>
    <p><span class="cmd">3 Jari:</span> Pohon Natal</p>
    <div class="info">👌 <span class="hl">Cubit/Rentangkan Jari</span> untuk <b>ZOOM</b></div>
</div>

<div id="video_container">
    <video id="input_video"></video>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// --- KONFIGURASI AWAL ---
const particleCount = 150000;
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

camera.position.z = 25;

// --- DATA GEOMETRI & BENTUK ---
const geometry = new THREE.BufferGeometry();
const posArray = new Float32Array(particleCount * 3);
const colArray = new Float32Array(particleCount * 3);

const shapes = {
    saturn: new Float32Array(particleCount * 3),
    eiffel: new Float32Array(particleCount * 3),
    earth: new Float32Array(particleCount * 3),
    earthCol: new Float32Array(particleCount * 3),
    xmas: new Float32Array(particleCount * 3),
    xmasCol: new Float32Array(particleCount * 3)
};

// --- GENERATOR BENTUK (Sama seperti sebelumnya) ---
for (let i = 0; i < particleCount; i++) {
    const idx = i * 3;
    // Saturn
    if (i < particleCount * 0.4) {
        const phi = Math.acos(-1 + (2 * i) / (particleCount * 0.4));
        const theta = Math.sqrt(particleCount * 0.4 * Math.PI) * phi;
        shapes.saturn[idx] = 4 * Math.cos(theta) * Math.sin(phi);
        shapes.saturn[idx+1] = 4 * Math.sin(theta) * Math.sin(phi);
        shapes.saturn[idx+2] = 4 * Math.cos(phi);
    } else {
        const r = 5.5 + Math.random() * 4.5;
        const a = Math.random() * Math.PI * 2;
        shapes.saturn[idx] = Math.cos(a) * r;
        shapes.saturn[idx+1] = (Math.random() - 0.5) * 0.4;
        shapes.saturn[idx+2] = Math.sin(a) * r;
    }
    // Eiffel
    const yE = (Math.random() * 20) - 10;
    const nYE = (yE + 10) / 20;
    const curve = 5 * Math.exp(-2.8 * nYE);
    const p = Math.floor(Math.random() * 4);
    shapes.eiffel[idx] = ((p < 2 ? 1 : -1) * curve) + (Math.random()-0.5)*0.1;
    shapes.eiffel[idx+1] = yE;
    shapes.eiffel[idx+2] = ((p % 2 === 0 ? 1 : -1) * curve) + (Math.random()-0.5)*0.1;
    // Earth
    const pE = Math.acos(-1 + (2 * i) / particleCount);
    const tE = Math.sqrt(particleCount * Math.PI) * pE;
    const ex = 7 * Math.cos(tE) * Math.sin(pE);
    const ey = 7 * Math.sin(tE) * Math.sin(pE);
    const ez = 7 * Math.cos(pE);
    shapes.earth[idx] = ex; shapes.earth[idx+1] = ey; shapes.earth[idx+2] = ez;
    const n = Math.sin(ex * 0.4) * Math.cos(ey * 0.4) * Math.sin(ez * 0.4);
    const c = new THREE.Color(n > 0.1 ? 0x1a4d1a : 0x001a33);
    shapes.earthCol[idx] = c.r; shapes.earthCol[idx+1] = c.g; shapes.earthCol[idx+2] = c.b;
    // Xmas
    const yX = (Math.random() * 16) - 8;
    const nYX = (yX + 8) / 16;
    const rX = (1.1 - nYX) * 6;
    shapes.xmas[idx] = (Math.random()-0.5) * rX; shapes.xmas[idx+1] = yX; shapes.xmas[idx+2] = (Math.random()-0.5) * rX;
    const cX = Math.random() > 0.98 ? new THREE.Color(0xff0000) : new THREE.Color(0x003300);
    shapes.xmasCol[idx] = cX.r; shapes.xmasCol[idx+1] = cX.g; shapes.xmasCol[idx+2] = cX.b;

    posArray[idx] = shapes.saturn[idx]; colArray[idx] = 1;
}

geometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
geometry.setAttribute('color', new THREE.BufferAttribute(colArray, 3));

const sprite = new THREE.TextureLoader().load('https://threejs.org/examples/textures/sprites/disc.png');
const material = new THREE.PointsMaterial({
    size: 0.08, map: sprite, vertexColors: true, transparent: true, alphaTest: 0.1, blending: THREE.AdditiveBlending, depthWrite: false
});
const points = new THREE.Points(geometry, material);
scene.add(points);

// --- LOGIKA SENSOR & PINCH ZOOM ---
let currentTarget = shapes.saturn;
let currentTargetCol = null;
let baseColor = new THREE.Color(0xffd700);
let targetScale = 1;

const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7 });

hands.onResults((res) => {
    if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
        const pts = res.multiHandLandmarks[0];
        
        // 1. Pelacakan Posisi
        points.position.x = THREE.MathUtils.lerp(points.position.x, (pts[9].x - 0.5) * -40, 0.1);
        points.position.y = THREE.MathUtils.lerp(points.position.y, (pts[9].y - 0.5) * -30, 0.1);

        // 2. LOGIKA MENCUBIT (PINCH ZOOM)
        // Hitung jarak antara ujung jempol (4) dan ujung telunjuk (8)
        const dx = pts[4].x - pts[8].x;
        const dy = pts[4].y - pts[8].y;
        const distance = Math.sqrt(dx*dx + dy*dy);
        
        // Normalisasi jarak menjadi skala (0.5 - 4.0)
        targetScale = THREE.MathUtils.clamp(distance * 6, 0.5, 4.0);

        // 3. Deteksi Jari untuk Bentuk
        const iU = pts[8].y < pts[6].y - 0.05;
        const mU = pts[12].y < pts[10].y - 0.05;
        const rU = pts[16].y < pts[14].y - 0.05;

        if (iU && mU && rU) { currentTarget = shapes.xmas; currentTargetCol = shapes.xmasCol; }
        else if (iU && mU) { currentTarget = shapes.earth; currentTargetCol = shapes.earthCol; }
        else if (iU) { currentTarget = shapes.eiffel; currentTargetCol = null; baseColor.setHex(0xffffff); }
        else { currentTarget = shapes.saturn; currentTargetCol = null; baseColor.setHex(0xffd700); }
    }
});

new Camera(document.getElementById('input_video'), {
    onFrame: async () => { await hands.send({image: document.getElementById('input_video')}); },
    width: 640, height: 480
}).start();

// --- ANIMATION LOOP ---
function animate() {
    requestAnimationFrame(animate);
    const pos = geometry.attributes.position;
    const col = geometry.attributes.color;

    // Smooth Scaling
    points.scale.setScalar(THREE.MathUtils.lerp(points.scale.x, targetScale, 0.1));

    for (let i = 0; i < particleCount; i++) {
        const idx = i * 3;
        pos.array[idx] += (currentTarget[idx] - pos.array[idx]) * 0.08;
        pos.array[idx+1] += (currentTarget[idx+1] - pos.array[idx+1]) * 0.08;
        pos.array[idx+2] += (currentTarget[idx+2] - pos.array[idx+2]) * 0.08;

        if (currentTargetCol) {
            col.array[idx] += (currentTargetCol[idx] - col.array[idx]) * 0.1;
            col.array[idx+1] += (currentTargetCol[idx+1] - col.array[idx+1]) * 0.1;
            col.array[idx+2] += (currentTargetCol[idx+2] - col.array[idx+2]) * 0.1;
        } else {
            col.array[idx] += (baseColor.r - col.array[idx]) * 0.1;
            col.array[idx+1] += (baseColor.g - col.array[idx+1]) * 0.1;
            col.array[idx+2] += (baseColor.b - col.array[idx+2]) * 0.1;
        }
    }
    pos.needsUpdate = true;
    col.needsUpdate = true;
    points.rotation.y += 0.005;
    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
